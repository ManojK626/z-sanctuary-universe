<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Z-Sanctuary World Observer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../core/feeling/feeling_panel.css" />
    <style>
      body {
        background: #030712;
        color: #e0f2ff;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        padding: 24px;
        margin: 0;
      }

      .panel {
        background: rgba(10, 20, 35, 0.85);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        max-width: 1000px;
        margin: auto;
      }

      h1 {
        font-size: 26px;
        margin-top: 0;
      }

      .article {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 12px 0;
      }

      .article:last-child {
        border-bottom: none;
      }

      .article-title {
        font-size: 20px;
        margin: 0 0 6px;
      }

      .meta {
        color: #95a5c4;
        font-size: 12px;
        letter-spacing: 0.04em;
      }

      .article-content {
        margin: 8px 0;
      }

      a {
        color: #4dd0ff;
        text-decoration: none;
      }
      a:focus {
        outline: 2px solid rgba(147, 197, 253, 0.6);
        outline-offset: 2px;
      }

      #status {
        font-size: 14px;
        padding-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Z-WORLDSTATE Observer</h1>
      <div id="status">Loading world news...</div>
      <div id="feed"></div>
    </div>

    <script>
      async function loadWorldFeed() {
        const status = document.getElementById('status');
        const feed = document.getElementById('feed');
        try {
          const resp = await fetch('../data/world_observer/news.json');
          if (!resp.ok) {
            throw new Error('Feed unavailable');
          }
          const articles = await resp.json();
          status.textContent = `Observed at ${new Date().toLocaleTimeString()} — ${articles.length} stories`;
          feed.innerHTML = '';
          articles.forEach((article) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'article';
            wrapper.innerHTML = `
            <div class="article-title">${article.title}</div>
            <div class="meta">${article.date} · ${article.time} · ${article.author || 'world desk'}</div>
            <div class="article-content">${article.content}</div>
            <div><a target="_blank" rel="noreferrer" href="${article.read_more || '#'}">Read more ↗</a></div>
          `;
            feed.appendChild(wrapper);
          });
        } catch (err) {
          status.textContent = 'World feed offline — check connection / run world_observer.';
          feed.innerHTML = `<p style="color:#ff8c42;">${err.message}</p>`;
        }
      }

      loadWorldFeed();
    </script>
    <script
      src="./z_bootstrap.js"
      data-z-root="../"
      data-z-apicon="true"
      data-z-jailcell="true"
      data-z-rhythm="true"
      data-z-feeling="true"
    ></script>
    <script src="/interface/z_accessibility.js"></script>
  </body>
</html>
