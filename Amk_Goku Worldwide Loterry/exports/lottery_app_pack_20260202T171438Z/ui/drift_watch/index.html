<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Z-Sanctuary · Drift Watch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #0f1218;
        color: #e6e8ee;
        padding: 24px;
        max-width: 960px;
        margin: auto;
      }
      h1 {
        font-size: 22px;
      }
      h2 {
        font-size: 16px;
        margin-top: 26px;
      }
      .box {
        background: rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        padding: 14px;
        margin-top: 10px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        margin: 4px 0;
      }
      .muted {
        opacity: 0.65;
        font-size: 13px;
      }
      .tag {
        padding: 2px 8px;
        border-radius: 8px;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.08);
      }
      a:focus {
        outline: 2px solid rgba(147, 197, 253, 0.6);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <h1>Drift Watch — Data Behavior Over Time</h1>
    <div class="muted">
      Observational timeline. Drift indicates change in data characteristics, not failure.
    </div>

    <div id="drift-root"></div>

    <script type="module" src="./drift_watch.js"></script>
    <script
      src="../z_bootstrap.js"
      data-z-root="../../"
      data-z-rhythm="true"
      data-z-feeling="true"
    ></script>
  </body>
</html>
