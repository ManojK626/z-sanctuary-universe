<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Z-Sanctuary · Lottery Vault Checklist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #0f1218;
        color: #e6e8ee;
        padding: 24px;
        max-width: 980px;
        margin: auto;
      }
      h1 {
        font-size: 22px;
      }
      .muted {
        opacity: 0.65;
        font-size: 13px;
      }
      .box {
        background: rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        padding: 14px;
        margin-top: 10px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .row:last-child {
        border-bottom: none;
      }
      .chip {
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.08);
      }
      .chip.ok {
        background: #1f6f4a;
        color: #eafff3;
      }
      .chip.missing {
        background: #7a5a12;
        color: #fff4d6;
      }
      .small {
        font-size: 12px;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <h1>Lottery Storage Vault · Manual Drop Checklist</h1>
    <div class="muted">
      Read-only status. Manual sources show as missing until a CSV is dropped into the vault raw
      folder.
    </div>

    <div id="summary" class="box muted"></div>
    <div id="checklist" class="box"></div>

    <script type="module" src="./checklist.js"></script>
    <script
      src="../z_bootstrap.js"
      data-z-root="../../"
      data-z-rhythm="true"
      data-z-feeling="true"
    ></script>
  </body>
</html>
