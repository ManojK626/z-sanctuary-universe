receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318

processors:
  batch: {}
  memory_limiter:
    check_interval: 1s
    limit_mib: 128
    spike_limit_mib: 32

exporters:
  file/shadow:
    path: data/reports/otel_shadow_telemetry.jsonl

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file/shadow]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file/shadow]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file/shadow]
