<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <rect width="100%" height="100%" fill="#0b0f1a" />
  <g transform="translate(450 300)">
    <circle r="30" fill="none" stroke="#00d4ff" stroke-width="2" />
    <circle r="80" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.85" />
    <circle r="130" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7" />
    <circle r="180" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5" />

    <circle r="155" fill="none" stroke="#7cff7c" stroke-width="2" stroke-dasharray="6 6" opacity="0.8" />

    <line x1="0" y1="-180" x2="0" y2="180" stroke="#1e90ff" stroke-width="1" opacity="0.35" />
    <line x1="-180" y1="0" x2="180" y2="0" stroke="#1e90ff" stroke-width="1" opacity="0.35" />
    <line x1="-127" y1="-127" x2="127" y2="127" stroke="#1e90ff" stroke-width="1" opacity="0.35" />
    <line x1="-127" y1="127" x2="127" y2="-127" stroke="#1e90ff" stroke-width="1" opacity="0.35" />

    <rect x="155" y="-15" width="25" height="25" fill="none" stroke="#ffcc00" stroke-width="2" />
    <path d="M 160 -40 A 40 40 0 0 1 200 -0" fill="none" stroke="#ffcc00" stroke-width="2" />
    <path d="M 170 -30 A 30 30 0 0 0 200 0" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.6" />

    <rect x="-15" y="-190" width="30" height="20" fill="#ff6b6b" opacity="0.4" />
    <rect x="170" y="-10" width="20" height="30" fill="#ffd166" opacity="0.4" />
    <rect x="-190" y="-10" width="20" height="30" fill="#6bcB77" opacity="0.4" />
    <rect x="-10" y="170" width="30" height="20" fill="#4d96ff" opacity="0.4" />
  </g>

  <text x="30" y="40" fill="#cbd5e1" font-family="Arial" font-size="18">Z Combat 360 Ring + Voxel Grid (Enhanced v1.1)</text>
  <text x="30" y="70" fill="#9fb3c8" font-family="Arial" font-size="14">Green dashed ring = Silent Threat Ring (defense awareness)</text>
  <text x="30" y="100" fill="#9fb3c8" font-family="Arial" font-size="14">Yellow box + arcs = Last-inch booster with dual-axis twist</text>
  <text x="30" y="130" fill="#9fb3c8" font-family="Arial" font-size="14">Colored blocks = Voxel heat lanes (top 4)</text>

  <text x="680" y="70" fill="#cbd5e1" font-family="Arial" font-size="12">Overlays</text>
  <text x="680" y="90" fill="#ff6b6b" font-family="Arial" font-size="12">Serpent / Coil</text>
  <text x="680" y="110" fill="#ffd166" font-family="Arial" font-size="12">Mantis / Precision</text>
  <text x="680" y="130" fill="#6bcB77" font-family="Arial" font-size="12">Jaguar / Burst</text>
  <text x="680" y="150" fill="#4d96ff" font-family="Arial" font-size="12">Tiger / Pressure</text>
</svg>
