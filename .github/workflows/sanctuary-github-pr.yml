# Z: Technical + Twin Roots PR gate (no execution enforcer prepended).
# Long-running — prefer as a required check only when stable; see docs/Z-GITHUB-SANCTUARY-GATE.md
name: Sanctuary GitHub PR

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: sanctuary-github-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python (for verify:full:technical scripts)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Sanctuary PR verify (technical + Twin Roots)
        run: npm run verify:sanctuary-github-pr
