# Z: Next.js web app — lint, tests (incl. manifest contract), production build.
# Runs when apps/web, Z-QOSMEI manifest, or z-sanctuary-core change; also manual dispatch.

name: CI Web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "data/z_qosmei_manifest.json"
      - "packages/z-sanctuary-core/**"
  push:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - "data/z_qosmei_manifest.json"
      - "packages/z-sanctuary-core/**"
  workflow_dispatch:

jobs:
  verify-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, test, and build (z-sanctuary-web)
        run: npm run verify:web
